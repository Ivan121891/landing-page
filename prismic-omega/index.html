<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Meta Pixel Code -->
    <script>
        !function (f, b, e, v, n, t, s) {
            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?
                n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            };
            if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
            n.queue = []; t = b.createElement(e); t.async = !0;
            t.src = v; s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s)
        }(window, document, 'script',
            'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1178133073434960');
        fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
            src="https://www.facebook.com/tr?id=1178133073434960&ev=PageView&noscript=1" /></noscript>
    <!-- End Meta Pixel Code -->
</head>

<body>
    <div class="app-container">
        <!-- View 1: Date Selection -->
        <main id="view-date" class="view active">
            <div class="hero-image">
                <img src="hero.png" alt="Spa Treatment" />
            </div>

            <div class="content-wrapper">
                <h1 class="title">Choose date and time for your Body Treatment</h1>

                <div class="calendar-header">
                    <button class="icon-btn" id="prev-month" aria-label="Previous Month"><i
                            class="fa-solid fa-chevron-left"></i></button>
                    <span id="current-month-year" class="month-label">March 2026</span>
                    <button class="icon-btn" id="next-month" aria-label="Next Month"><i
                            class="fa-solid fa-chevron-right"></i></button>
                </div>

                <div class="section-label">Date</div>

                <div class="calendar-grid" id="calendar-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>

        <!-- View 2: Time Selection -->
        <main id="view-time" class="view">
            <div class="content-wrapper padding-top-lg">
                <button class="back-link" id="back-to-date">
                    <i class="fa-solid fa-chevron-left"></i> Back
                </button>

                <h1 class="title">Select your preferred time</h1>
                <p class="subtitle" id="selected-date-display">March 5, 2026</p>

                <div class="time-section">
                    <h2 class="section-title">Morning</h2>
                    <div class="time-grid" id="morning-slots">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="time-section">
                    <h2 class="section-title">Afternoon</h2>
                    <div class="time-grid" id="afternoon-slots">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </main>

        <!-- View 3: Details Form -->
        <main id="view-form" class="view">
            <div class="content-wrapper padding-top-lg">
                <button class="back-link" id="back-to-time">
                    <i class="fa-solid fa-chevron-left"></i> Back
                </button>

                <h1 class="title">Enter your details</h1>
                <p class="subtitle" id="final-datetime-display">March 5, 2026 at 10:00 AM</p>

                <form id="booking-form" class="booking-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" required>
                    </div>

                    <button type="submit" class="primary-btn">Schedule Appointment</button>
                </form>
            </div>
        </main>

        <!-- View 4: Success Message (Bonus) -->
        <main id="view-success" class="view">
            <div class="content-wrapper success-wrapper">
                <div class="success-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h1 class="title">Appointment Confirmed!</h1>
                <p class="success-text">We've received your booking for:</p>
                <div class="success-details" id="success-datetime"></div>
                <button class="primary-btn" id="start-over" style="margin-top: 2rem;">Book Another</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
